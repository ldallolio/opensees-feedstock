{% set name = "OpenSees" %}
{% set version = "3.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/OpenSees/OpenSees/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 395d89f97ad0fe2a857e31b045c96badf23ad19ba8ce38f21c5a5d7891091810

build:
  number: 1
  skip: true  # [py>=312 or not win]
  missing_dso_whitelist:
    - "*/libopenblas.*"
    - "*/libquadmath.*"  # [osx]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - {{ stdlib('c') }}
    - cmake
    - make  # [unix]
    - jom  # [win]
    - llvm-openmp  # [osx]
    - intel-openmp  # [win]
    - libgomp  # [linux]
    - openmpi  # [unix]
  host:
    - python
    - pip
    - setuptools
    - libblas * *openblas  # [unix]
    - libcblas * *openblas  # [unix]
    - liblapack * *openblas  # [unix]
    - libblas  # [win]
    - libcblas  # [win]
    - liblapack  # [win]
    - mumps-mpi  # [unix]
    - scalapack  # [unix]
    - eigen
    - hdf5
    - tk
    - zlib
    - metis
    - libscotch  # [unix]
    - libaec
    - libcurl
    - openssl
    - openmpi  # [unix]
  run:
    - python
    - libblas * *openblas  # [unix]
    - libcblas * *openblas  # [unix]
    - liblapack * *openblas  # [unix]
    - mumps-mpi  # [unix]
    - scalapack  # [unix]
    - intel-openmp  # [win]
    - llvm-openmp  # [osx]
    - openmpi  # [unix]

test:
  commands:
    - test -f $PREFIX/bin/OpenSees  # [unix]
    - if not exist %LIBRARY_BIN%\\OpenSees.exe exit 1  # [win]
  imports:
    - opensees

about:
  home: https://opensees.berkeley.edu/
  summary: 'Simulate the performance of structural and geotechnical systems subjected to earthquakes'
  license: BSD-4-Clause-UC
  license_family: BSD
  license_file: COPYRIGHT
  doc_url: https://opensees.github.io/OpenSeesDocumentation/
  dev_url: https://github.com/OpenSees/OpenSees

extra:
  recipe-maintainers:
    - ldallolio