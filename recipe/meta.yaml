{% set name = "OpenSees" %}
{% set version = "3.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/OpenSees/OpenSees/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 395d89f97ad0fe2a857e31b045c96badf23ad19ba8ce38f21c5a5d7891091810

build:
  number: 1
  # Instructions say Python 3.12+ is not supported yet
  skip: true  # [py>=312]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - {{ stdlib('c') }}
    - cmake
    - make   # [unix]
    - ninja  # [win]
    # Unix uses OpenMPI, Windows uses MSMPI on conda-forge
    - openmpi  # [unix]
    - msmpi    # [win]
  host:
    - python
    - pip
    - setuptools
    - mumps
    - eigen
    - hdf5
    - scalapack
    - tk
    - zlib
    - mkl
    - mkl-include
    - mkl-devel
    - metis
    - libscotch
    - libaec
    - libcurl
    - openssl
    - openmpi  # [unix]
    - msmpi    # [win]
  run:
    - python
    - mkl
    - scalapack
    # Windows needs intel-openmp for the libiomp5md.dll dependency mentioned
    - intel-openmp  # [win]
    - openmpi  # [unix]
    - msmpi    # [win]

test:
  commands:
    - test -f $PREFIX/bin/OpenSees  # [unix]
    - if not exist %LIBRARY_BIN%\\OpenSees.exe exit 1  # [win]

  imports:
    - opensees

about:
  home: https://opensees.berkeley.edu/
  summary: 'Simulate the performance of structural and geotechnical systems subjected to earthquakes'
  description: |
    OpenSees is a software framework for developing applications
     to simulate the performance of structural and geotechnical systems 
     subjected to earthquakes. 
  license: BSD-4-Clause-UC
  license_family: BSD
  license_file: COPYRIGHT
  doc_url: https://opensees.github.io/OpenSeesDocumentation/
  dev_url: https://github.com/OpenSees/OpenSees

extra:
  recipe-maintainers:
    - ldallolio